name: Update Tool Data
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch GitHub data
        run: npx tsx scripts/fetch-github.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Fetch npm data
        run: npx tsx scripts/fetch-npm.ts
      - name: Fetch HN data
        run: npx tsx scripts/fetch-hn.ts
      - name: Fetch OSS Health
        run: npx tsx scripts/fetch-oss-health.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Commit & Push
        run: |
          git config user.name "devtools-bot"
          git config user.email "bot@devtools.wiki"
          git add data/
          git diff --cached --quiet || git commit -m "data: update tool data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push
