name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Bot data commits push with the built-in GITHUB_TOKEN, which by design does
    # NOT trigger on:push workflows — so without a schedule the live site never
    # picks up bot data updates (update-data every 6h, trending daily 06:00 UTC).
    # Rebuild twice a day, shortly after the data pipelines land fresh data.
    - cron: '0 7 * * *'   # after 06:00 trending + 06:00 tool-data
    - cron: '0 19 * * *'  # after 18:00 tool-data
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=dev-tools-portal --branch=main --commit-dirty=true

      - name: Summary
        if: always()
        run: |
          echo "### Deploy result" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
